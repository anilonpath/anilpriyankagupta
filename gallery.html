<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery &mdash; Anil &amp; Priyanka</title>
  <meta name="description" content="Captured moments of Anil and Priyanka." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hearts-container" aria-hidden="true"></div>
  <div id="nav-placeholder"></div>

  <main>
    <header class="page-hero">
      <p class="page-hero-eyebrow reveal">Captured moments</p>
      <h1 class="page-hero-title reveal">Our Gallery</h1>
      <div class="ornament reveal"><span></span><svg viewBox="0 0 32 29.6"><path d="M23.6,0c-3.4,0-6.3,2.2-7.6,5.3C14.7,2.2,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg><span></span></div>
      <p class="page-hero-subtitle reveal">Little albums &mdash; each a chapter of a place we visited, a moment we shared.</p>
    </header>

    <!-- ================= ALBUM: AGRA ================= -->
    <section id="album-agra" class="section album">
      <header class="album-header reveal">
        <p class="album-eyebrow">Album One</p>
        <h2 class="album-title">Agra</h2>
        <p class="album-subtitle">~ City of Eternal Love ~</p>
        <div class="ornament"><span></span><svg viewBox="0 0 32 29.6"><path d="M23.6,0c-3.4,0-6.3,2.2-7.6,5.3C14.7,2.2,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg><span></span></div>
        <p class="album-caption">
          Where the greatest monument to love in the world stands &mdash; and where
          we walked together, hand in hand, promising forever.
        </p>
      </header>

      <div class="gallery-grid">
        <figure class="gallery-item reveal" data-caption="At the Taj Mahal &mdash; a monument to eternal love">
          <div class="gallery-placeholder">Photo 1</div>
          <img class="gallery-photo" src="images/agra/1.jpg" alt="Anil and Priyanka at the Taj Mahal" onerror="this.remove()" />
        </figure>
        <figure class="gallery-item reveal" data-caption="Together in the city of love">
          <div class="gallery-placeholder">Photo 2</div>
          <img class="gallery-photo" src="images/agra/2.jpg" alt="Together in Agra" onerror="this.remove()" />
        </figure>
        <figure class="gallery-item reveal" data-caption="Walking the Mughal corridors">
          <div class="gallery-placeholder">Photo 3</div>
          <img class="gallery-photo" src="images/agra/3.jpg" alt="At the Mughal corridors" onerror="this.remove()" />
        </figure>
        <figure class="gallery-item reveal" data-caption="Amongst the Taj gardens">
          <div class="gallery-placeholder">Photo 4</div>
          <img class="gallery-photo" src="images/agra/4.jpg" alt="At the Taj gardens" onerror="this.remove()" />
        </figure>
        <figure class="gallery-item reveal" data-caption="A moment we will treasure">
          <div class="gallery-placeholder">Photo 5</div>
          <img class="gallery-photo" src="images/agra/5.jpg" alt="A treasured moment in Agra" onerror="this.remove()" />
        </figure>
        <figure class="gallery-item reveal" data-caption="Memories from Agra">
          <div class="gallery-placeholder">Photo 6</div>
          <img class="gallery-photo" src="images/agra/6.jpg" alt="Memories from Agra" onerror="this.remove()" />
        </figure>
      </div>
    </section>

    <!-- ================= FUTURE ALBUMS =================
      Copy the section above and change:
        - id="album-<name>"
        - Album eyebrow (e.g. Album Two)
        - Album title (e.g. Kushinagar, Deoria, Mahuwari)
        - Subtitle, caption
        - Photo folder path (e.g. images/kushinagar/)
    ==================================================== -->

    <div id="page-nav-placeholder"></div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="script.js"></script>
</body>
</html>
