<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Send Us Love &mdash; Anil &amp; Priyanka</title>
  <meta name="description" content="Leave a wish or a lovely message for Anil and Priyanka." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hearts-container" aria-hidden="true"></div>
  <div id="nav-placeholder"></div>

  <main>
    <header class="page-hero">
      <p class="page-hero-eyebrow reveal">Share your blessings</p>
      <h1 class="page-hero-title reveal">Send Us a Love Note</h1>
      <div class="ornament reveal"><span></span><svg viewBox="0 0 32 29.6"><path d="M23.6,0c-3.4,0-6.3,2.2-7.6,5.3C14.7,2.2,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg><span></span></div>
      <p class="page-hero-subtitle reveal">Write a message for Anil &amp; Priyanka &mdash; a wish, a memory, or a little bit of love.</p>
    </header>

    <section id="wishes" class="section wishes-section">
      <div class="wishes-grid">
        <!-- FORM CARD -->
        <div class="wish-card reveal">
          <form id="wishForm" class="wish-form" novalidate>
            <div class="wish-heart-burst" aria-hidden="true"></div>

            <div class="form-field">
              <input type="text" id="wishName" name="name" required maxlength="60" autocomplete="name" placeholder=" " />
              <label for="wishName">Your Name</label>
              <span class="field-line"></span>
            </div>

            <div class="form-field">
              <textarea id="wishMessage" name="message" required maxlength="500" rows="5" placeholder=" "></textarea>
              <label for="wishMessage">Your Lovely Message</label>
              <span class="field-line"></span>
              <span class="char-count"><span id="wishCount">0</span> / 500</span>
            </div>

            <div class="form-error" id="wishError" role="alert"></div>

            <button type="submit" class="wish-submit">
              <span class="btn-label">Send with Love</span>
              <svg class="btn-heart" viewBox="0 0 32 29.6" aria-hidden="true">
                <path d="M23.6,0c-3.4,0-6.3,2.2-7.6,5.3C14.7,2.2,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z"/>
              </svg>
            </button>

            <!-- Success overlay -->
            <div class="wish-success" id="wishSuccess" aria-hidden="true">
              <div class="success-heart">
                <svg viewBox="0 0 32 29.6"><path d="M23.6,0c-3.4,0-6.3,2.2-7.6,5.3C14.7,2.2,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,16,21.2,16,21.2s16-11.8,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg>
              </div>
              <h3>Thank you, <span id="successName">friend</span>!</h3>
              <p>Your love has been delivered <br /> to Anil &amp; Priyanka.</p>
              <button type="button" class="wish-again">Write another</button>
            </div>
          </form>
        </div>

        <!-- GUESTBOOK -->
        <aside class="guestbook reveal">
          <h3 class="guestbook-title">Words from loved ones</h3>
          <div id="guestbookList" class="guestbook-list">
            <p class="guestbook-empty">Be the first to leave a note. <span aria-hidden="true">&#9825;</span></p>
          </div>
        </aside>
      </div>
    </section>

    <div id="page-nav-placeholder"></div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="script.js"></script>
</body>
</html>
